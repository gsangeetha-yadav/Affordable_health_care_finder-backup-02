<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Affordable Healthcare Finder</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-r from-blue-100 to-green-100 min-h-screen">

<!-- HEADER -->

<div class="bg-white shadow-lg p-6">

<h1 class="text-5xl font-bold text-blue-700 text-center">

🏥 Affordable Healthcare Finder

</h1>

<p class="text-center text-gray-600 mt-4 text-xl">

Search Hospitals or Treatments

</p>

</div>

<!-- SEARCH -->

<div class="max-w-5xl mx-auto p-6 mt-10">

<div class="bg-white p-8 rounded-3xl shadow-2xl">

<div class="flex flex-col md:flex-row gap-4">

<input
type="text"
id="searchInput"
placeholder="Search hospital or treatment..."
class="border border-blue-300 p-4 rounded-2xl w-full text-lg">

<button
onclick="searchHospital()"
class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl">

🔍 Search

</button>

<button
onclick="voiceSupport()"
class="bg-green-500 hover:bg-green-600 text-white px-8 py-4 rounded-2xl">

🎤 Voice

</button>

</div>

</div>

</div>

<!-- RESULTS -->

<div
id="results"
class="max-w-6xl mx-auto grid md:grid-cols-2 gap-8 p-6">

</div>

<script>

const hospitals = [

{

hospital: "BKS Hospital Ballari",

treatment: "Lung Infection Treatment",

keyword: "lungs",

budget: "₹10000 - ₹50000",

rating: "4.5",

location: "Ballari",

phone: "08392234567",

details:
"Treatment includes oxygen support, respiratory therapy and lung infection care."

},

{

hospital: "Ballari Lifeline Hospital",

treatment: "Kidney Stone Treatment",

keyword: "kidney",

budget: "₹40000 - ₹100000",

rating: "4.6",

location: "Ballari",

phone: "08392245678",

details:
"Treatment includes kidney scan, dialysis support and kidney stone removal."

},

{

hospital: "Aaryadana Hospital",

treatment: "Diabetes Management",

keyword: "diabetic",

budget: "₹3000 - ₹8000",

rating: "4.7",

location: "Ballari",

phone: "08392256789",

details:
"Includes sugar testing, insulin monitoring and diabetic management."

},

{

hospital: "Hrudayalaya Hospital",

treatment: "Heart Attack Emergency Care",

keyword: "heart attack",

budget: "₹100000 - ₹300000",

rating: "4.9",

location: "Ballari",

phone: "08392267890",

details:
"Includes ECG scan, ICU monitoring and emergency heart care."

},

{

hospital: "BHCC Hospital Ballari",

treatment: "Cancer Treatment",

keyword: "cancer",

budget: "₹50000 - ₹200000",

rating: "4.8",

location: "Ballari",

phone: "08392278901",

details:
"Includes chemotherapy, radiation therapy and cancer diagnosis."

}

];

function searchHospital(){

const input =
document.getElementById("searchInput")
.value
.toLowerCase()
.trim();

const results =
document.getElementById("results");

results.innerHTML = "";

const filtered =
hospitals.filter(item =>

item.hospital.toLowerCase().includes(input)

||

item.keyword.toLowerCase().includes(input)

||

item.treatment.toLowerCase().includes(input)

);

if(filtered.length > 0){

filtered.forEach(item => {

results.innerHTML += `

<div class="bg-white p-8 rounded-3xl shadow-2xl">

<h1 class="text-3xl font-bold text-green-600">

${item.hospital}

</h1>

<p class="mt-4 text-lg">

⭐ Rating:
<b>${item.rating}</b>

</p>

<p class="mt-3 text-lg">

🩺 Treatment:
<b>${item.treatment}</b>

</p>

<p class="mt-3 text-lg">

💰 Budget:
<b>${item.budget}</b>

</p>

<p class="mt-3 text-lg">

📍 Location:
<b>${item.location}</b>

</p>

<p class="mt-4 text-gray-700 leading-8">

📄 ${item.details}

</p>

<div class="grid grid-cols-2 gap-4 mt-8">

<button
onclick="callHospital('${item.phone}')"
class="bg-green-500 hover:bg-green-600 text-white py-3 rounded-2xl">

📞 Call

</button>

<button
onclick="openMap('${item.hospital}')"
class="bg-purple-500 hover:bg-purple-600 text-white py-3 rounded-2xl">

📍 Maps

</button>

<button
onclick="bookAppointment()"
class="bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-2xl">

📅 Appointment

</button>

<button
onclick="shareDetails('${item.hospital}')"
class="bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-2xl">

📤 Share

</button>

</div>

</div>

`;

});

}

else{

results.innerHTML = `

<div class="bg-white p-10 rounded-3xl shadow-2xl text-center w-full">

<h1 class="text-4xl text-red-500 font-bold">

❌ No Results Found

</h1>

<p class="mt-5 text-lg">

Try searching:
BKS Hospital Ballari,
BHCC Hospital Ballari,
Hrudayalaya Hospital,
kidney,
cancer,
lungs,
diabetic

</p>

</div>

`;

}

}

function callHospital(number){

window.location.href =
"tel:" + number;

}

function openMap(hospital){

window.open(
"https://www.google.com/maps/search/" + hospital,
"_blank"
);

}

function bookAppointment(){

alert("✅ Appointment Booked");

}

function shareDetails(hospital){

navigator.clipboard.writeText(hospital);

alert("✅ Hospital Name Copied");

}

function voiceSupport(){

const speech =
new SpeechSynthesisUtterance(

"Welcome to Affordable Healthcare Finder. Search hospitals or treatments to view healthcare details and budgets."

);

window.speechSynthesis.speak(speech);

}

</script>

</body>
</html>
