<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Affordable Healthcare Finder</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-blue-50">

<!-- HEADER -->

<div class="bg-blue-700 text-white p-6 text-center shadow-lg">

<h1 class="text-4xl font-bold">
🏥 Affordable Healthcare Finder
</h1>

<p class="mt-3 text-lg">
Search treatments, hospitals and budgets
</p>

</div>

<!-- SEARCH -->

<div class="max-w-4xl mx-auto mt-10 p-6">

<div class="bg-white p-8 rounded-3xl shadow-2xl">

<div class="flex flex-col md:flex-row gap-4">

<input
id="searchInput"
type="text"
placeholder="Search treatment..."
class="border border-blue-300 p-4 rounded-2xl w-full text-lg">

<button
onclick="searchTreatment()"
class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl text-lg">

🔍 Search

</button>

<button
onclick="voiceSupport()"
class="bg-green-500 hover:bg-green-600 text-white px-8 py-4 rounded-2xl text-lg">

🎤 Voice

</button>

</div>

</div>

</div>

<!-- RESULTS -->

<div id="results"
class="max-w-6xl mx-auto grid md:grid-cols-2 gap-8 p-6">

</div>

<!-- EMERGENCY -->

<div class="max-w-5xl mx-auto mt-10 p-6">

<div class="bg-red-500 text-white p-10 rounded-3xl text-center shadow-2xl">

<h1 class="text-4xl font-bold">
🚑 Emergency Support
</h1>

<div class="mt-8 flex justify-center gap-5 flex-wrap">

<button
onclick="callAmbulance()"
class="bg-white text-red-600 px-8 py-3 rounded-2xl font-bold">

Ambulance

</button>

<button
onclick="callEmergency()"
class="bg-white text-red-600 px-8 py-3 rounded-2xl font-bold">

Emergency

</button>

</div>

</div>

</div>

<script>

const hospitalData = {

"diabetic": {

hospital: "Aaryadana Hospital",

rating: "4.7",

budget: "₹3000 - ₹8000",

location: "Ballari",

phone: "08392256789",

treatment:
"Diabetes Management & Sugar Control",

details:
"Includes sugar test, insulin monitoring, BP checkup, diet consultation and diabetic care."

},

"cancer": {

hospital: "BHCC Hospital Ballari",

rating: "4.8",

budget: "₹50000 - ₹200000",

location: "Ballari",

phone: "08392278901",

treatment:
"Cancer Treatment & Chemotherapy",

details:
"Includes chemotherapy, radiation therapy, ICU support and cancer diagnosis."

},

"heart attack": {

hospital: "Hrudayalaya Hospital",

rating: "4.9",

budget: "₹100000 - ₹300000",

location: "Ballari",

phone: "08392267890",

treatment:
"Heart Attack Emergency Care",

details:
"Includes ECG scan, angioplasty, ICU monitoring and emergency treatment."

},

"cardiac arrest": {

hospital: "Hrudayalaya Hospital",

rating: "4.9",

budget: "₹150000 - ₹400000",

location: "Ballari",

phone: "08392267890",

treatment:
"Cardiac Arrest ICU Care",

details:
"Includes CPR support, ventilator support and emergency cardiac care."

},

"kidney": {

hospital: "Ballari Lifeline Hospital",

rating: "4.6",

budget: "₹40000 - ₹100000",

location: "Ballari",

phone: "08392245678",

treatment:
"Kidney Stone Treatment",

details:
"Includes kidney scan, dialysis support and kidney stone removal."

},

"lungs": {

hospital: "BKS Hospital Ballari",

rating: "4.5",

budget: "₹10000 - ₹50000",

location: "Ballari",

phone: "08392234567",

treatment:
"Lung Infection Treatment",

details:
"Includes oxygen support, respiratory therapy and lung infection care."

},

"chronic disorders": {

hospital: "Aaryadana Hospital",

rating: "4.7",

budget: "₹15000 - ₹70000",

location: "Ballari",

phone: "08392256789",

treatment:
"Chronic Disease Management",

details:
"Includes long term monitoring, medicine support and specialist consultation."

}

};

function searchTreatment(){

const input =
document.getElementById("searchInput")
.value
.toLowerCase()
.trim();

const results =
document.getElementById("results");

results.innerHTML = "";

if(hospitalData[input]){

const item = hospitalData[input];

results.innerHTML = `

<div class="bg-white p-8 rounded-3xl shadow-2xl">

<h1 class="text-3xl font-bold text-green-600">

${item.hospital}

</h1>

<p class="mt-4 text-lg">

⭐ Rating:
<b>${item.rating}</b>

</p>

<p class="mt-3 text-lg">

🩺 Treatment:
<b>${item.treatment}</b>

</p>

<p class="mt-3 text-lg">

💰 Budget:
<b>${item.budget}</b>

</p>

<p class="mt-3 text-lg">

📍 Location:
<b>${item.location}</b>

</p>

<p class="mt-4 text-gray-700 text-lg leading-8">

📄 ${item.details}

</p>

<div class="grid grid-cols-2 gap-4 mt-8">

<button
onclick="callHospital('${item.phone}')"
class="bg-green-500 hover:bg-green-600 text-white py-3 rounded-2xl">

📞 Call

</button>

<button
onclick="openMap('${item.hospital}')"
class="bg-purple-500 hover:bg-purple-600 text-white py-3 rounded-2xl">

📍 Maps

</button>

<button
onclick="bookAppointment()"
class="bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-2xl">

📅 Appointment

</button>

<button
onclick="shareDetails()"
class="bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-2xl">

📤 Share

</button>

</div>

</div>

`;

}

else{

results.innerHTML = `

<div class="bg-white p-10 rounded-3xl shadow-2xl text-center w-full">

<h1 class="text-3xl text-red-500 font-bold">

❌ Treatment Not Found

</h1>

<p class="mt-5 text-lg">

Try:
diabetic,
cancer,
kidney,
lungs,
heart attack,
cardiac arrest,
chronic disorders

</p>

</div>

`;

}

}

function callHospital(number){

window.location.href = "tel:" + number;

}

function openMap(hospital){

window.open(
"https://www.google.com/maps/search/" + hospital,
"_blank"
);

}

function bookAppointment(){

alert("✅ Appointment Booked Successfully");

}

function shareDetails(){

alert("✅ Hospital details shared");

}

function callAmbulance(){

window.location.href = "tel:108";

}

function callEmergency(){

window.location.href = "tel:102";

}

function voiceSupport(){

const speech =
new SpeechSynthesisUtterance(

"Welcome to Affordable Healthcare Finder. Search treatments like diabetic, cancer, kidney, lungs, heart attack and chronic disorders to view hospital budgets and treatment details."

);

speech.lang = "en-US";

window.speechSynthesis.speak(speech);

}

</script>

</body>
</html>
